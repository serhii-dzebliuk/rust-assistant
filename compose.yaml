name: rust-assistant

services:
  proxy:
    image: caddy:2.11.2
    container_name: rust-assistant-proxy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: ${PORT}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - public
      - app

  backend:
    image: ghcr.io/serhii-dzebliuk/rust-assistant:latest
    container_name: rust-assistant-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      HOST: ${HOST}
      PORT: ${PORT}
      RELOAD: ${RELOAD}
      API_MODE: ${API_MODE}
      POSTGRES_STATUS: ${POSTGRES_STATUS}
      QDRANT_STATUS: ${QDRANT_STATUS}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}
      QDRANT_URL: ${QDRANT_URL}
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_MODEL: ${LLM_MODEL}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FORMAT: ${LOG_FORMAT}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:$${PORT}/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app
      - db

  postgres:
    image: postgres:18
    container_name: rust-assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db

  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: rust-assistant-qdrant
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - db

networks:
  public:
  app:
  db:
    internal: true

volumes:
  caddy_config:
  caddy_data:
  postgres_data:
  qdrant_data:

