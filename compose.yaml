name: rust-assistant

services:
  proxy:
    image: caddy:2.11.2
    container_name: rust-assistant-proxy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: ${PORT}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - public
      - app

  backend:
    image: ghcr.io/serhii-dzebliuk/rust-assistant:latest
    container_name: rust-assistant-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      tei-embedder:
        condition: service_healthy
      tei-reranker:
        condition: service_healthy
    environment:
      HOST: ${HOST}
      PORT: ${PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE}
      QDRANT_DISTANCE: ${QDRANT_DISTANCE}
      QDRANT_UPSERT_BATCH_SIZE: ${QDRANT_UPSERT_BATCH_SIZE}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MAX_OUTPUT_TOKENS: ${OPENAI_MAX_OUTPUT_TOKENS}
      OPENAI_REQUEST_TIMEOUT_SECONDS: ${OPENAI_REQUEST_TIMEOUT_SECONDS}
      CHAT_RETRIEVAL_LIMIT: ${CHAT_RETRIEVAL_LIMIT}
      CHAT_RERANKING_LIMIT: ${CHAT_RERANKING_LIMIT}
      CHAT_USE_RERANKING: ${CHAT_USE_RERANKING}
      CHAT_MAX_QUERY_TOKENS: ${CHAT_MAX_QUERY_TOKENS}
      CHAT_MAX_CONTEXT_TOKENS: ${CHAT_MAX_CONTEXT_TOKENS}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL}
      EMBEDDING_NORMALIZE: ${EMBEDDING_NORMALIZE}
      EMBEDDING_MAX_BATCH_ITEMS: ${EMBEDDING_MAX_BATCH_ITEMS}
      EMBEDDING_REQUEST_TIMEOUT_SECONDS: ${EMBEDDING_REQUEST_TIMEOUT_SECONDS}
      EMBEDDING_POOLING: ${EMBEDDING_POOLING}
      EMBEDDING_MAX_BATCH_TOKENS: ${EMBEDDING_MAX_BATCH_TOKENS}
      EMBEDDING_MAX_CONCURRENT_REQUESTS: ${EMBEDDING_MAX_CONCURRENT_REQUESTS}
      RERANKER_MODEL: ${RERANKER_MODEL}
      RERANKER_BASE_URL: ${RERANKER_BASE_URL}
      RERANKER_MAX_BATCH_ITEMS: ${RERANKER_MAX_BATCH_ITEMS}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FORMAT: ${LOG_FORMAT}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:$${PORT}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app
      - private

  postgres:
    image: postgres:18
    container_name: rust-assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - private

  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: rust-assistant-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - private

  tei-embedder:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: rust-assistant-embedder
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    volumes:
      - tei_embedder_data:/data
    networks:
      - private
    command:
      - --model-id
      - "${EMBEDDING_MODEL}"
      - --pooling
      - "${EMBEDDING_POOLING}"
      - --max-batch-tokens
      - "${EMBEDDING_MAX_BATCH_TOKENS}"
      - --max-concurrent-requests
      - "${EMBEDDING_MAX_CONCURRENT_REQUESTS}"

  tei-reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: rust-assistant-reranker
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    volumes:
      - tei_reranker_data:/data
    networks:
      - private
    command:
      - --model-id
      - "${RERANKER_MODEL}"

networks:
  public:
  app:
  private:

volumes:
  caddy_config:
  caddy_data:
  postgres_data:
  qdrant_data:
  tei_embedder_data:
  tei_reranker_data:
